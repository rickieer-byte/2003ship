<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provision Account - Digital Process Architecture</title>
    <style>
        :root {
            --primary: #10b981;
            --bg-main: #f4f6f9;
            --surface: #ffffff;
            --text-dark: #334155;
            --border: #d1d5db;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--surface);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
        }
        h2 {
            color: var(--primary);
            margin: 0 0 25px 0;
            font-size: 22px;
            text-align: center;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: white;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background: #059669;
        }
        p {
            text-align: center;
            font-size: 13px;
            margin-top: 25px;
            color: #64748b;
        }
        a {
            color: #1e3a8a;
            text-decoration: none;
            font-weight: 600;
        }
        .flash {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 20px;
            font-weight: 500;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Access Provisioning</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required autocomplete="off">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required autocomplete="off">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>Operational Scope / Role</label>
            <select name="role">
                <option value="Planner">Planner</option>
                <option value="Dispatcher">Dispatcher</option>
                <option value="Fleet Manager">Fleet Manager</option>
            </select>
        </div>
        <button type="submit">Register Token</button>
    </form>
    <p>Already authorized? <a href="/login">Return to Login</a></p>
</div>
</body>
</html>
